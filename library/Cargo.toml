[package]
name = "proka-bootloader"
version = "0.3.0"
edition = "2024"
authors = ["zhangxuan2011 <zx20110412@outlook.com>"]
description = "The bootloader for Proka OS"
license = "GPL-3.0"

[dependencies]
uefi = { version = "0.35", optional = true}

[features]
default = []
loader_main = ["uefi"]

[profile.dev]
panic = "abort"

[profile.release]
opt-level = "z"
lto = true
strip = "debuginfo"
codegen-units = 1
panic = "abort"
